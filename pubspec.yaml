name: cricket_live_tracker
description: Live Cricket Score Tracker App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  pull_to_refresh: ^2.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
